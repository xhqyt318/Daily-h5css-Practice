<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
      color: #333;
      font-family: Arial, sans-serif;
      height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }


    .header {
      height: 100px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      justify-content: space-between;
      align-items: center;
      background-color: #f5f5f5;
      padding: 0 20px;
      font-size: 16px;
      border: 1px solid #ccc;



    }

    .header p {

      border: 1px solid #ccc;
      text-align: center;
      border-radius: 5px;
    }

    .main {
      display: flex;
      margin: 20px;
      border: 1px solid #ccc;
      flex-direction: row;
      height: 100vh;
      justify-content: space-between;
    }

    .left {
      flex: 0 0 200px;
      background-color: blue;
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      border-right: 1px solid #fff;
    }

    .right {
      flex: 0 0 200px;
      background-color: #007bff;
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      border-left: 1px solid #fff;
    }

    .center {
      flex: 1;
      padding: 20px;
      background-color: pink;
      border-radius: 5px;
      border: 1px solid white;
    }

    .help {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background-color: #f5f5f5;
      width: 60px;
      height: 60px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.2);

      &:hover {
        background-color: #e5e5e5;
      }

    }
  </style>
</head>

<body>
  <div class="container">
    <header class="header">
      <p>设置</p>
      <p>帮助</p>
      <p>退出登录</p>
      <p>用户中心</p>
      <p>个人信息</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
      <p>联系客服</p>
    </header>
    <main class="main">
      <aside class="left">
        左侧边栏
      </aside>
      <section class="center">
        中间地图区
      </section>
      <aside class="right">
        右侧边栏
      </aside>


    </main>
    <button class="help">帮助</button>
  </div>
</body>

</html>
