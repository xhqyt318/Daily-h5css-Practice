<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div[class*='box'] {
      width: 100px;
      height: 200px;
      margin: 20px;
    }

    .box1 {
      border: 1px solid red;
      border-radius: 100px 0;

    }

    .box2 {
      border: 1px dashed red;
      padding: 10px;
      line-height: 200px;
    }
  </style>
</head>

<body>
  <div class="box1"></div>
  <div class="box2">靶心挂在嘴角</div>
</body>

</html>
