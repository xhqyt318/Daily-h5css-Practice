<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <!-- 块级元素 -->
  <h1>我是块级元素</h1>
  <p>我是块级元素</p>
  <p><strong>加粗</strong></p>
  <!-- 内联元素 -->
  <strong>我是内联元素</strong><strong>我是内联元素</strong><strong>我是内联元素</strong>
  <em>我是内联元素</em>
  <strong><em>我是内联元素</em></strong>
  <!-- 特殊情况，p里面不能包含其他块级元素 -->
</body>

</html>
