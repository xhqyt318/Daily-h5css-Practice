<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>1. 无序列表</h2>
  <ul>
    <li>1</li>
    <li>2</li>
    <li>3</li>
  </ul>
  <h2>2. 有序列表</h2>
  <ol>
    <li>1</li>
    <li>2</li>
    <li>3</li>
  </ol>
  <h2>3. 描述列表</h2>
  <dl>
    <dt>1</dt>
    <dd>111</dd>
    <dt>2</dt>
    <dd>222</dd>
    <dt>3</dt>
    <dd>333</dd>
  </dl>
</body>

</html>
