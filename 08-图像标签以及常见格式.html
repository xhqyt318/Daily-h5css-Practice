<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h2>图像标签的基本使用</h2>
  <img src="4.jpg" alt="回锅肉饭">
  <h2>图像标签修改宽度和高度</h2>
  <img src="4.jpg" alt="回锅肉饭" width="300">
  <!-- 一般情况下，宽度和高度修改一个就行 -->
  <img src="4.jpg" alt="回锅肉饭" width="300" height="300">
  <h2>图像标签添加title属性</h2>
  <img src="4.jpg" alt="回锅肉饭" width="300" title="回锅肉饭">



  <h2>插入不同格式的图片</h2>
  <img src="1.png" alt="">
  <img src="2.gif" alt="">
  <img src="3.avif" alt="">
  <img src="5.webp" alt="">
</body>

</html>
